  w_bit: 8  # 权重量化位数
  a_bit: 8  # 激活量化位数

  v1:
    metadata:
      config_id: qwen3-dense-w8a8-v1
      score: 90
      label:
        is_sparse: false
        kv_cache: false

    qconfigs:
      default_w8a8_dynamic:
        act:
          scope: "per_token"      # 激活值量化范围: per_token 或 per_tensor
          dtype: "int8"           # 数据类型: int8
          symmetric: true         # 是否对称量化
          method: "minmax"        # 量化方法: minmax
        weight:
          scope: "per_channel"    # 权重量化范围: per_channel 或 per_group
          dtype: "int8"           # 数据类型: int8
          symmetric: true         # 是否对称量化
          method: "ssz"        # 量化方法: minmax, ssz

      # w4a8量化配置（4bit权重，8bit激活）
      default_w4a8_dynamic:
        act:
          scope: "per_token"
          dtype: "int8"
          symmetric: true
          method: "minmax"
        weight:
          scope: "per_channel"
          dtype: "int4"
          symmetric: true
          method: "ssz"

    # v1格式的process配置（定义量化策略组）
    # 注意：include/exclude不需要配置，AQT会自动填充
    process:
      - type: "group"
        configs:
          - type: "linear_quant"
            qconfig_ref: "default_w4a8_dynamic"  # 引用 w4a8 动态配置
          - type: "linear_quant"
            qconfig_ref: "default_w8a8_dynamic"  # 引用上面定义的qconfig锚点

    save:
      - type: "ascendv1_saver"
        part_file_size: 4

  # modelslim_v0 格式配置（legacy格式，非AQT场景使用，将来会被移除）
