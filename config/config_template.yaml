# -----------------------------------------------
# 评估配置
# -----------------------------------------------
evaluation_tolerance_ratio: 1
disable_qwen_thinking: true

evaluation_datasets:
  ceval:
    config_name: "ceval_gen_5_shot_str"
    mode: "all"
    target_accuracy: 50.0
  aime2024:
    config_name: "aime2024_gen_0_shot_chat_prompt"
    mode: "all"
    target_accuracy: 90.0
    tolerance_ratio: 6.67
    metric_keys:
      - "aime2024_accuracy"

aisbench_timeout: 7200
aisbench_request_rate: 1
aisbench_retry: 2
aisbench_batch_size: 32
aisbench_max_out_len: 2
aisbench_pred_postprocessor: "extract_non_reasoning_content"
aisbench_generation_kwargs:
  temperature: 0.5
  top_k: 10
  top_p: 0.95
  seed: null
  repetition_penalty: 1.03
aisbench_log_dir: "workspace/aisbench_logs"
aisbench_default_metric_keys:
  - "final_accuracy"
  - "accuracy"
  - "score"
aisbench_use_chat_template: false
aisbench_cleanup_model_config: true
aisbench_extra_args: null

# -----------------------------------------------
# VLLM-Ascend Server
# -----------------------------------------------
vllm_port: 1234
vllm_env_vars:
  HCCL_BUFFSIZE: 1024
  VLLM_VERSION: "0.11.0"
  ASCEND_RT_VISIBLE_DEVICES: "0,1"
  # HCCL_OP_EXPANSION_MODE: "AIV"
vllm_args:
  trust-remote-code: true
  tensor-parallel-size: 2
  data-parallel-size: 1
  quantization: "ascend"
  enable-prefix-caching: false
  max-model-len: 8192
  max-num-batched-tokens: 8192
  gpu-memory-utilization: 0.9
  additional_config:
    ascend_scheduler_config:
      enabled: true
    enable_weight_nz_layout: true

# -----------------------------------------------
# 量化器 (Modelslim) 配置
# -----------------------------------------------
quantization_visible_devices: "0,1,2,3"
quantization_model_type: "Qwen3-32B"
quantization_device: "npu"
quantization_trust_remote_code: true

# Modelslim YAML 配置模板
quantization_template_config:
  apiversion: modelslim_v0
  metadata:
    config_id: qwen3-32b-dense-w8a8
    score: 90
    verified_model_types:
      - Qwen3-32B
    label: { w_bit: 8, a_bit: 8, is_sparse: false, kv_cache: false }
  spec:
    # anti_cfg: { anti_method: m4 }
    calib_cfg:
      w_bit: 8
      a_bit: 8
      mm_tensor: false
      pdmix: false
    calib_dataset: "mix_calib.jsonl"
    calib_save_params: { part_file_size: 4 }

# -----------------------------------------------
# Automatic Quantization Tool (AQT)
# 如果项目根目录存在 automatic-quantization-tool 且未显式关闭，将自动启用。
# -----------------------------------------------
aqt_enabled: true
aqt_project_dir: "automatic-quantization-tool"
aqt_quant_data_path: "/path/to/calib_data.txt"     # 必填：校准集路径
aqt_quant_data_save_path: null                      # 可选：临时 token ids 存放路径
aqt_quant_samples_num: 128
aqt_quant_context_length: 4096
aqt_sensitivity_metric: "mse"
aqt_initial_budget_mb: 2500
aqt_budget_step_mb: 500
aqt_budget_step_down_mb: 250
aqt_min_budget_mb: 0
aqt_max_budget_mb: 12000
aqt_tighten_margin_ratio: 0.01
aqt_results_dir: "workspace/aqt_results"
aqt_omp_num_threads: 32
aqt_ascend_visible_devices: "0"
