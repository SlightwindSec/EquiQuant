base_model_path: "/mnt/share/weight/Qwen3-32B"

# -----------------------------------------------
# 工作区 (运行时文件)
# -----------------------------------------------
workspace_base_dir: "workspace"
workspace_current_run_dir: "current_run"
workspace_history_dir: "history"
workspace_best_weights_dir: "best_weights"
workspace_quant_config_name: "generated_modelslim_config.yaml"
